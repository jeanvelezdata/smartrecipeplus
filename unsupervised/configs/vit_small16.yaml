# Backbone
backbone: vit_small_patch16_224
embed_dim: 384              
use_imagenet_init: true

# DINO head
proj_hidden_dim: 2048
proj_bottleneck_dim: 256
proj_output_dim: 65536     
num_proj_layers: 3

# Multi-crop augmentation
global_crop_size: 224
local_crop_size: 96
num_global_crops: 2
num_local_crops: 6          

# Training
batch_size: 64              
epochs: 100
warmup_epochs: 10
base_lr: 0.0005             
weight_decay: 0.04
weight_decay_end: 0.4

# Teacher EMA
teacher_momentum_start: 0.996
teacher_momentum_end: 1.0

# Temperature
teacher_temp: 0.04
teacher_temp_warmup: 0.04
teacher_temp_warmup_epochs: 0
student_temp: 0.1

# Center momentum
center_momentum: 0.9

# System
num_workers: 2
pin_memory: true
checkpoint_freq: 10          
output_dir: ./checkpoints/vit_small16
